name: ci

on:
  # Run on every push to any branch — including branches created by GitHub
  # Actions (release-please, dependabot grouping). The default `pull_request`
  # trigger does not fire for PRs created via GITHUB_TOKEN, which would leave
  # required status checks waiting forever.
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Syntax check
        run: node --check extension.js
      - name: Validate VS Code extension manifest
        run: npx --yes @vscode/vsce package --no-dependencies --out /tmp/test.vsix
