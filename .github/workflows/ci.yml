name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Syntax check
        run: node --check extension.js
      - name: Validate VS Code extension manifest
        run: npx --yes @vscode/vsce package --no-dependencies --out /tmp/test.vsix
